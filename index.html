<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>k pop одевалка</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<!-- ===== LOADING SCREEN ===== -->
<div id="loading-screen">
<div class="loading-content">
<div class="loading-star">⭐</div>
<h1 id="loading-title">K-Pop Dress Up</h1>
<div class="loading-bar-wrap"><div id="loading-bar"></div></div>
<p id="loading-text">Preparing your idol debut...</p>
</div>
</div>
<!-- ===== INTRO DIALOGUE ===== -->
<div id="intro-overlay" class="hidden">
<div id="intro-bg"></div>
<div id="intro-character">
<div id="intro-char-stage"></div>
</div>
<div id="intro-dialogue">
<div id="intro-name-badge"></div>
<div id="intro-text"></div>
<div id="intro-dots"></div>
<button id="intro-next-btn"></button>
</div>
</div>
<!-- ===== MAIN GAME ===== -->
<div id="game" class="hidden">
<!-- Header -->
<header id="game-header">
<h1 class="game-title" id="header-title">✨ K-Pop Dress Up ✨</h1>
<div class="header-buttons">
<button id="stars-display" class="stars-btn">⭐ <span id="stars-count">0</span></button>
<button id="btn-runway" class="btn btn-runway-main hidden">🌟 <span id="btn-runway-label">Runway!</span></button>
<button id="btn-achievements" class="btn btn-yellow">🏆</button>
<button id="btn-sound" class="btn btn-sound">🔊</button>
</div>
</header>
<!-- Assignment Banner (school mode only) -->
<div id="assignment-banner" class="hidden">
<div id="banner-inner">
<span id="banner-lesson"></span>
<span id="banner-task"></span>
<span id="banner-tags"></span>
</div>
</div>
<!-- Main layout -->
<main id="main-layout">
<!-- LEFT: category selector -->
<aside id="category-panel">
<p class="panel-label">Category</p>
<div id="category-list"></div>
</aside>
<!-- CENTER: character stage -->
<section id="stage-wrap">
<div id="stage">
<div id="character-layers"></div>
<div id="sparkles"></div>
</div>
<div id="outfit-name-display"></div>
<button id="btn-random-stage" class="btn-random-stage">🎲</button>
<button id="btn-share-stage" class="btn-share-stage">📸</button>
</section>
<!-- RIGHT: items grid -->
<aside id="items-panel">
<p class="panel-label" id="items-panel-title">Items</p>
<div id="items-grid"></div>
</aside>
</main>
</div>
<!-- ===== CATWALK OVERLAY ===== -->
<div id="catwalk-overlay" class="hidden">
<div class="catwalk-bg">
<div class="runway-lights">
<div class="runway-light"></div><div class="runway-light"></div>
<div class="runway-light"></div><div class="runway-light"></div>
<div class="runway-light"></div>
</div>
<div class="catwalk-phrase-wrap">
<div id="catwalk-phrase"></div>
</div>
<div id="catwalk-stage-wrap">
<div id="catwalk-stage"></div>
</div>
<div class="runway-floor">
<span class="runway-text">✦ R U N W A Y ✦</span>
</div>
</div>
</div>
<!-- ===== SCORE MODAL ===== -->
<div id="score-modal" class="modal-overlay hidden">
<div class="modal-box score-box">
<div class="score-header">
<div id="score-assignment-title"></div>
<div id="score-tag-info"></div>
</div>
<div id="judge-cards"></div>
<div class="score-breakdown">
<div class="breakdown-row">
<span class="breakdown-label" id="breakdown-tag-label">Tag Match</span>
<div class="breakdown-bar-wrap"><div class="breakdown-bar" id="bar-tags"></div></div>
<span class="breakdown-pts" id="pts-tags"></span>
</div>
<div class="breakdown-row">
<span class="breakdown-label" id="breakdown-complete-label">Completeness</span>
<div class="breakdown-bar-wrap"><div class="breakdown-bar" id="bar-complete"></div></div>
<span class="breakdown-pts" id="pts-complete"></span>
</div>
<div class="breakdown-row">
<span class="breakdown-label" id="breakdown-judge-label">Judge Bonus</span>
<div class="breakdown-bar-wrap"><div class="breakdown-bar" id="bar-judges"></div></div>
<span class="breakdown-pts" id="pts-judges"></span>
</div>
</div>
<div class="score-total-row">
<span class="score-total-label" id="score-lesson-label">Lesson Score</span>
<span class="score-total-num" id="score-total-num">0</span>
<span class="score-total-max">/100</span>
</div>
<button id="btn-double-reward" class="btn btn-double-reward score-btn hidden"></button>
<button id="btn-retry-lesson" class="btn btn-retry-lesson score-btn hidden"></button>
<button id="btn-next-lesson" class="btn btn-purple score-btn"></button>
<button id="btn-share-score" class="btn btn-share-outfit">📸 <span id="btn-share-score-label">Share Outfit</span></button>
</div>
</div>
<!-- ===== DAILY SUMMARY MODAL ===== -->
<div id="summary-modal" class="modal-overlay hidden">
<div class="modal-box summary-box">
<div id="summary-emoji-big"></div>
<h2 id="summary-title"></h2>
<div id="summary-day-score"></div>
<div id="summary-lessons-list"></div>
<div id="summary-rank-section">
<div id="summary-rank-badge"></div>
<div id="summary-rank-progress-wrap">
<div id="summary-rank-bar"></div>
</div>
<div id="summary-rank-next"></div>
</div>
<button id="btn-new-day" class="btn btn-pink score-btn">☀️ Next School Day</button>
<button id="btn-exit-school" class="btn btn-teal score-btn-sm hidden">🎨 Free Style Mode</button>
</div>
</div>
<!-- ===== DAILY LOGIN POPUP ===== -->
<div id="daily-login-popup" class="modal-overlay hidden">
<div class="modal-box daily-box">
<div class="daily-icon">🌟</div>
<h2 class="daily-title">Daily Bonus!</h2>
<div id="daily-streak-text" class="daily-streak"></div>
<div id="daily-stars-reward" class="daily-reward"></div>
<button id="daily-collect-btn" class="btn btn-purple score-btn">✨ Collect!</button>
</div>
</div>
<!-- ===== ACHIEVEMENTS MODAL ===== -->
<div id="achievements-modal" class="modal-overlay hidden">
<div class="modal-box ach-modal-box">
<div class="ach-modal-header">
<span>🏆 <span id="ach-modal-title">Achievements</span></span>
<button id="achievements-close" class="ach-close-btn">✕</button>
</div>
<div id="achievements-list" class="ach-list"></div>
</div>
</div>
<!-- ===== SHOP MODAL ===== -->
<div id="shop-modal" class="modal-overlay hidden">
<div class="modal-box shop-box">
<div class="shop-header">
<span>💎 <span id="shop-title">Магазин звёзд</span></span>
<button id="shop-close" class="ach-close-btn">✕</button>
</div>
<p class="shop-subtitle" id="shop-subtitle">Покупай звёзды и открывай новые вещи!</p>
<div id="shop-packages"></div>
</div>
</div>
<!-- ===== SHARE GENERATING OVERLAY ===== -->
<div id="share-generating" class="hidden">
<div id="share-generating-box">
<div class="sg-icon">📸</div>
<p id="share-generating-text">Создаём образ...</p>
</div>
</div>
<!-- Yandex Games SDK — обязательно до game.js -->
<script src="/sdk.js"></script>
<script src="game.js"></script>
</body>
</html>
